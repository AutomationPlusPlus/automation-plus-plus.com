name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  PROJECT: automation-plus-plus-com
  APEX: automation-plus-plus.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Ensure Pages project exists
        run: |
          set -o pipefail
          if npx wrangler@4 pages project create "$PROJECT" --production-branch=main 2>&1 | tee create.log; then
            echo "Project created."
          elif grep -qi "already exists" create.log; then
            echo "Project already exists — continuing."
          else
            echo "Project creation failed for another reason." >&2
            exit 1
          fi

      - name: Deploy
        run: npx wrangler@4 pages deploy public --project-name="$PROJECT" --branch=main

      - name: Attach custom domains
        run: |
          for domain in "$APEX" "www.$APEX"; do
            resp=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"$domain\"}")
            ok=$(echo "$resp" | jq -r '.success')
            if [ "$ok" = "true" ]; then
              echo "Attached $domain"
            elif echo "$resp" | jq -r '.errors[].message' | grep -qi "already"; then
              echo "$domain already attached"
            else
              echo "Failed to attach $domain:" >&2
              echo "$resp" | jq '.errors' >&2
              exit 1
            fi
          done

      - name: Upsert DNS records
        run: |
          zone=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=$APEX" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          ZONE_ID=$(echo "$zone" | jq -r '.result[0].id // empty')
          if [ -z "$ZONE_ID" ]; then
            echo "Could not resolve zone ID for $APEX — the API token likely lacks Zone:Read for this zone." >&2
            echo "$zone" | jq '.errors' >&2
            exit 1
          fi
          for name in "$APEX" "www.$APEX"; do
            existing=$(curl -sS "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$name" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')
            body=$(jq -n --arg name "$name" --arg target "$PROJECT.pages.dev" \
              '{type: "CNAME", name: $name, content: $target, proxied: true, ttl: 1}')
            if [ -n "$existing" ]; then
              method=PUT; url="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$existing"
            else
              method=POST; url="https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records"
            fi
            resp=$(curl -sS -X "$method" "$url" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "$body")
            if [ "$(echo "$resp" | jq -r '.success')" = "true" ]; then
              echo "Upserted CNAME $name -> $PROJECT.pages.dev"
            else
              echo "Failed to upsert DNS for $name:" >&2
              echo "$resp" | jq '.errors' >&2
              exit 1
            fi
          done
